name: Flutter CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # =============== Flutter分析 ===============
  analyze:
    name: Flutter分析
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: Flutter分析
        run: flutter analyze

  # =============== Android构建 ===============
  build-android:
    name: Android构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 构建APK
        run: flutter build apk --debug
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  # =============== iOS构建 ===============
  build-ios:
    name: iOS构建
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 构建iOS
        run: flutter build ios --simulator --no-codesign

  # =============== Windows构建 ===============
  build-windows:
    name: Windows构建
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 构建Windows
        run: flutter build windows --release

  # =============== macOS构建 ===============
  build-macos:
    name: macOS构建
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 构建macOS
        run: flutter build macos --release

  # =============== Linux构建 ===============
  build-linux:
    name: Linux构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 安装Linux依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev pkg-config liblzma-dev libstdc++-12-dev
      
      - name: 构建Linux
        run: flutter build linux --release
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
