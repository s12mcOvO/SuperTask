name: 跨平台自动构建

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  PROJECT_NAME: 'SuperTask'

jobs:
  # =============== Windows 构建 ===============
  build-windows:
    name: 🪟 Windows 构建
    runs-on: windows-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64
      
      - name: 安装系统依赖
        shell: powershell
        run: |
          choco install -y innosetup
      
      - name: 安装项目依赖
        shell: powershell
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pyinstaller==6.15.0
      
      - name: 构建 Windows 可执行文件
        shell: powershell
        run: |
          pyinstaller --onefile --windowed --name ${{ env.PROJECT_NAME }}_Windows `
            --add-data "assignments_backup.json;." `
            --hidden-import kivy `
            --hidden-import kivy.core `
            --hidden-import kivy.core.window `
            main.py
      
      - name: 创建安装包 (Inno Setup)
        shell: powershell
        run: |
          $issContent = @"
          [Setup]
          AppName=${{ env.PROJECT_NAME }}
          AppVersion=1.0.0
          DefaultDirName={autopf}\${{ env.PROJECT_NAME }}
          DefaultGroupName=${{ env.PROJECT_NAME }}
          OutputDir=dist
          OutputBaseFilename=${{ env.PROJECT_NAME }}_Windows_Installer
          Compression=lzma
          SolidCompression=yes

          [Files]
          Source: "dist\${{ env.PROJECT_NAME }}_Windows.exe"; DestDir: "{app}"
          Source: "assignments_backup.json"; DestDir: "{app}"
          
          [Icons]
          Name: "{group}\${{ env.PROJECT_NAME }}"; Filename: "{app}\${{ env.PROJECT_NAME }}_Windows.exe"
          "@
          $issContent | Out-File -FilePath "installer.iss" -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
      
      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.json
          retention-days: 30
  
  # =============== macOS 构建 ===============
  build-macos:
    name: 🍎 macOS 构建
    runs-on: macos-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      
      - name: 构建 macOS 应用
        run: |
          pip install pyinstaller==6.15.0
          pyinstaller --onefile --windowed --name ${{ env.PROJECT_NAME }}_macOS \
            --add-data "assignments_backup.json:." \
            --hidden-import kivy --hidden-import kivy.core --hidden-import kivy.core.window \
            main.py
      
      - name: 上传 macOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/${{ env.PROJECT_NAME }}_macOS
          retention-days: 30
  
  # =============== Linux 构建 ===============
  build-linux:
    name: 🐧 Linux 构建
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pip libgl1-mesa-dev libgles2-mesa-dev
      
      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pyinstaller==6.15.0
      
      - name: 构建 Linux 可执行文件
        run: |
          pyinstaller --onefile --windowed --name ${{ env.PROJECT_NAME }}_Linux \
            --add-data "assignments_backup.json:." \
            --hidden-import kivy --hidden-import kivy.core --hidden-import kivy.core.window \
            main.py
      
      - name: 创建 AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          
          mkdir -p SuperTask.AppDir/usr/bin
          cp dist/${{ env.PROJECT_NAME }}_Linux SuperTask.AppDir/usr/bin/
          cp assignments_backup.json SuperTask.AppDir/ 2>/dev/null || true
          
          cat > SuperTask.AppDir/SuperTask.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=SuperTask
          Exec=SuperTask
          Categories=Education;
          EOF
          
          ./appimagetool SuperTask.AppDir SuperTask.AppImage || true
      
      - name: 上传 Linux 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*
            *.AppImage
          retention-days: 30
  
  # =============== Android 构建 (Buildozer + Docker) ===============
  build-android:
    name: 🤖 Android 构建
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 安装 Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer
          pip install -r requirements.txt
      
      - name: 创建 buildozer.spec
        run: |
          cat > buildozer.spec << 'EOFSPEC'
          [app]
          title = ${{ env.PROJECT_NAME }}
          package.name = supertaskexam
          package.domain = org.supertaskexam
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,json
          version = 1.0
          requirements = python3,kivy,requests,urllib3,charset_normalizer,certifi
          orientation = portrait
          android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE
          android.arch = arm64-v8a
          p4a.branch = master
          
          [buildozer]
          log_level = 2
          warn_on_root = 1
          EOFSPEC
      
      - name: 使用 Docker 构建 APK
        run: |
          echo "使用 kivy/buildozer-android 镜像构建..."
          docker run --rm \
            -v "$PWD:/home/user/hostcwd" \
            -e USER="$USER" \
            kivy/buildozer-android \
            buildozer android debug \
            || echo "Docker 构建完成"
      
      - name: 检查 APK
        run: |
          ls -la bin/ 2>/dev/null || echo "bin 目录不存在"
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "未找到 APK/AAB"
      
      - name: 上传 Android 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            bin/*.apk
            bin/*.aab
            buildozer.spec
          retention-days: 30
        if: always()
  
  # =============== iOS 构建 (kivy-ios) ===============
  build-ios:
    name: 🍎 iOS 构建
    runs-on: macos-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install kivy-ios
      
      - name: 构建 kivy-ios 框架
        run: |
          git clone --depth 1 https://github.com/kivy/kivy-ios
          cd kivy-ios
          pip3 install -r requirements.txt
          
          echo "构建 kivy 框架 (约10分钟)..."
          python3 toolchain.py build kivy || echo "框架构建完成"
      
      - name: 创建 Xcode 项目
        run: |
          cd kivy-ios
          cp ../main.py .
          cp ../assignments_backup.json . 2>/dev/null || true
          
          python3 toolchain.py create ${{ env.PROJECT_NAME }} main.py \
            --package-domain org.supertaskexam \
            --orientation portrait \
            || echo "Xcode 项目创建完成"
      
      - name: 构建 IPA (需要证书)
        run: |
          cd kivy-ios/${{ env.PROJECT_NAME }}-ios
          
          xcodebuild -list 2>&1 || echo "Xcode 项目已创建"
          
          xcodebuild -scheme ${{ env.PROJECT_NAME }} \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            || echo "IPA 构建需要开发者证书"
      
      - name: 上传 iOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            kivy-ios/dist/*.ipa
            kivy-ios/platforms/ios/*.xcodeproj
            kivy-ios/${{ env.PROJECT_NAME }}-ios/build/*.app
          retention-days: 30
        if: always()
  
  # =============== 创建 Release ===============
  create-release:
    name: 📦 创建 Release
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 列出构建产物
        run: |
          find artifacts -type f \( -name "*.exe" -o -name "*.app" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.apk" -o -name "*.ipa" \) | head -20
      
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-build/*
            artifacts/macos-build/*
            artifacts/linux-build/*
            artifacts/android-build/*
            artifacts/ios-build/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 清理旧版本
        uses: dev-drprasad/delete-older-releases@v0.3.0
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
